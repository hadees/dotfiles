# Base16 Eighties theme for lazygit (darkened bg #262626).
# Palette matches the iTerm/VSCode/k9s Base16 Eighties setup.
gui:
  theme:
    activeBorderColor:
      - '#ffcc66'
      - bold
    inactiveBorderColor:
      - '#747369'
    optionsTextColor:
      - '#6699cc'
    selectedLineBgColor:
      - '#262626'
    selectedRangeBgColor:
      - '#262626'
    cherryPickedCommitBgColor:
      - '#6699cc'
    cherryPickedCommitFgColor:
      - '#d3d0c8'
    unstagedChangesColor:
      - '#f2777a'
    defaultFgColor:
      - '#d3d0c8'
