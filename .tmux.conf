# Use Vim shortcuts
setw -g mode-keys vi

# Make `Ctrl+B R` reload the config file
unbind r
bind r source-file ~/.tmux.conf

# Base16 Eighties status bar (darkened bg #1a1a1a/#262626 to match the rest).
set -g status-style "bg=#262626,fg=#d3d0c8"
set -g status-left-style "fg=#66cccc"
set -g status-right-style "fg=#747369"
set -g window-status-style "fg=#747369"
set -g window-status-current-style "fg=#1a1a1a,bg=#ffcc66"
set -g window-status-activity-style "fg=#f99157"
set -g pane-border-style "fg=#393939"
set -g pane-active-border-style "fg=#6699cc"
set -g message-style "bg=#262626,fg=#ffcc66"
set -g mode-style "bg=#3a3a3a,fg=#d3d0c8"
